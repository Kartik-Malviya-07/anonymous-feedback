<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Feedback System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-bg">
    <div class="container">
        <div class="card login-card">
            <div class="card-header">
                <div class="admin-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>Admin Access</h1>
                <p>Please log in to view feedback</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" required>
                    </div>
                </div>
                
                <div id="loginError" class="hidden error-msg-box"></div>
                
                <button type="submit" class="btn primary-btn w-100 mt-4" id="loginBtn">
                    <span>Secure Login</span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>
            
            <div class="admin-link text-center mt-4">
                <a href="{{ url_for('index') }}"><i class="fa-solid fa-arrow-left"></i> Back to Feedback Form</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
